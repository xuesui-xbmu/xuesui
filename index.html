<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 基础练习</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .box {
            background: #f5f7fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>JavaScript 基础知识点练习</h1>

    <div class="box">
        <h3>1. 变量定义与类型</h3>
        <p id="varResult"></p >
    </div>

    <div class="box">
        <h3>2. 表达式与运算</h3>
        <p id="calcResult"></p >
    </div>

    <div class="box">
        <h3>3. 流程控制（条件判断 + 循环）</h3>
        <p id="flowResult"></p >
    </div>

    <div class="box">
        <h3>4. 函数定义与调用</h3>
        <p id="funcResult"></p >
    </div>

    <script>
        // 1. 变量定义与类型
        let name = "小明";
        let age = 20;
        let isStudent = true;
        let score = null;
        let hobby; // undefined

        let varInfo = `
            字符串变量：name = ${name}（类型：${typeof name}）<br>
            数字变量：age = ${age}（类型：${typeof age}）<br>
            布尔变量：isStudent = ${isStudent}（类型：${typeof isStudent}）<br>
            空值变量：score = ${score}（类型：${typeof score}）<br>
            未定义变量：hobby = ${hobby}（类型：${typeof hobby}）
        `;
        document.getElementById("varResult").innerHTML = varInfo;

        // 2. 表达式与运算
        let a = 10;
        let b = 3;
        let add = a + b;
        let subtract = a - b;
        let multiply = a * b;
        let divide = a / b;
        let remainder = a % b;

        let calcInfo = `
            a = ${a}, b = ${b}<br>
            加法：a + b = ${add}<br>
            减法：a - b = ${subtract}<br>
            乘法：a * b = ${multiply}<br>
            除法：a / b = ${divide.toFixed(2)}<br>
            取余：a % b = ${remainder}
        `;
        document.getElementById("calcResult").innerHTML = calcInfo;

        // 3. 流程控制
        let flowInfo = "";
        // 条件判断
        if (age >= 18) {
            flowInfo += `年龄 ${age}，已成年<br>`;
        } else {
            flowInfo += `年龄 ${age}，未成年<br>`;
        }

        // 循环
        flowInfo += "循环输出 1~5：";
        for (let i = 1; i <= 5; i++) {
            flowInfo += i + " ";
        }

        document.getElementById("flowResult").innerHTML = flowInfo;

        // 4. 函数定义与调用
        function greet(userName) {
            return `你好，${userName}！欢迎学习 JavaScript`;
        }

        function square(num) {
            return num * num;
        }

        let funcInfo = `
            调用 greet 函数：${greet(name)}<br>
            调用 square 函数（age 的平方）：${square(age)}
        `;
        document.getElementById("funcResult").innerHTML = funcInfo;
    </script>
</body>
</html>
